<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Terminal</title>
  <script type="module" src="design-system.js"></script>
  <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css">
  <link rel="stylesheet" href="terminal.css">
  <link rel="stylesheet" href="prompt-library.css">
</head>
<body>
  <!-- Library toggle button (fixed position) -->
  <button id="prompt-toggle-btn">Library</button>

  <!-- Main layout: terminal + prompt panel -->
  <div id="terminal-layout">
    <div id="terminal-container"></div>
    <div id="resize-divider" style="display: none;"></div>
    <div id="prompt-panel" class="collapsed">
      <div id="prompt-panel-header">
        <h3>Library</h3>
        <div class="prompt-panel-actions">
          <button class="prompt-panel-btn add-btn" title="Add to library">+</button>
          <button class="prompt-panel-btn collapse-btn" title="Close panel">×</button>
        </div>
      </div>
      <div id="prompt-tabs">
        <button class="prompt-tab active" data-tab="prompts">Prompts<span class="prompt-tab-badge" hidden></span></button>
        <button class="prompt-tab" data-tab="notes">Notes<span class="prompt-tab-badge" hidden></span></button>
        <button class="prompt-tab" data-tab="secrets">Secrets<span class="prompt-tab-badge" hidden></span></button>
      </div>
      <div id="prompt-scope-filter">
        <button class="prompt-scope-btn active" data-scope="all">All</button>
        <button class="prompt-scope-btn" data-scope="global">Global</button>
        <button class="prompt-scope-btn" data-scope="project">Project</button>
      </div>
      <div id="prompt-search-container">
        <input type="text" id="prompt-search-input" placeholder="Search...">
      </div>
      <div id="prompt-cards-container"></div>
    </div>
  </div>

  <div id="usage-bars">
    <div class="usage-bar">
      <div class="usage-label">Session</div>
      <div class="usage-track">
        <div class="usage-fill" id="session-fill"></div>
        <div class="usage-time-marker" id="session-time-marker"></div>
      </div>
      <div class="usage-text" id="session-text">--</div>
    </div>
    <div class="usage-bar">
      <div class="usage-label">Weekly</div>
      <div class="usage-track">
        <div class="usage-fill" id="weekly-fill"></div>
        <div class="usage-time-marker" id="weekly-time-marker"></div>
      </div>
      <div class="usage-text" id="weekly-text">--</div>
    </div>
    <div class="usage-bar" id="extra-usage-bar" hidden>
      <div class="usage-label">Extra</div>
      <div class="usage-track">
        <div class="usage-fill" id="extra-fill"></div>
      </div>
      <div class="usage-text" id="extra-text">--</div>
    </div>
    <div id="usage-freshness" aria-label="Last update time">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1"/>
        <path d="M6 3.25V6L8 7.25" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div id="usage-tooltip" role="tooltip">Usage data not yet loaded — updates every 5 minutes</div>
    </div>
  </div>
  <script src="../../node_modules/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="../../node_modules/marked/lib/marked.umd.js"></script>
  <script src="../../node_modules/dompurify/dist/purify.min.js"></script>
  <script src="prompt-library.js"></script>
  <script src="terminal.js"></script>
</body>
</html>

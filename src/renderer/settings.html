<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Settings</title>
  <script type="module" src="design-system.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--color-bg-base, #1a1a20);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    /* Full page layout */
    .settings-page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-4, 16px) var(--spacing-6, 24px);
      background: var(--color-bg-surface, #1f1f24);
      border-bottom: 1px solid var(--color-border-default, #3c3c42);
      flex-shrink: 0;
    }

    .settings-title {
      font-size: var(--font-size-xl, 18px);
      font-weight: var(--font-weight-semibold, 600);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    .done-btn {
      padding: var(--spacing-2, 8px) var(--spacing-4, 16px);
      background: var(--color-primary-base, #6366f1);
      border: none;
      border-radius: var(--radius-md, 6px);
      color: white;
      font-size: var(--font-size-sm, 11px);
      font-weight: var(--font-weight-medium, 500);
      cursor: pointer;
      transition: background var(--transition-fast, 0.15s ease);
    }

    .done-btn:hover {
      background: var(--color-primary-hover, #5558e3);
    }

    /* Content area */
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-6, 24px);
    }

    .settings-content::-webkit-scrollbar {
      width: 8px;
    }

    .settings-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .settings-content::-webkit-scrollbar-thumb {
      background: var(--color-border-subtle, #333338);
      border-radius: 4px;
    }

    .settings-content::-webkit-scrollbar-thumb:hover {
      background: var(--color-border-default, #3c3c42);
    }

    /* Settings grid */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--spacing-4, 16px);
      max-width: 1200px;
    }

    /* Section card */
    .settings-card {
      background: var(--color-bg-surface, #1f1f24);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-lg, 8px);
      padding: var(--spacing-5, 20px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-3, 12px);
      margin-bottom: var(--spacing-4, 16px);
      padding-bottom: var(--spacing-3, 12px);
      border-bottom: 1px solid var(--color-border-subtle, #333338);
    }

    .card-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-primary-muted, rgba(99, 102, 241, 0.15));
      border-radius: var(--radius-md, 6px);
      color: var(--color-primary-base, #6366f1);
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
    }

    .card-title {
      font-size: var(--font-size-md, 14px);
      font-weight: var(--font-weight-semibold, 600);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    /* Settings group */
    .settings-group {
      margin-bottom: var(--spacing-4, 16px);
    }

    .settings-group:last-child {
      margin-bottom: 0;
    }

    .settings-label {
      display: block;
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
      font-size: var(--font-size-sm, 11px);
      font-weight: var(--font-weight-medium, 500);
      margin-bottom: var(--spacing-2, 8px);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .settings-description {
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-sm, 11px);
      margin-top: var(--spacing-1, 4px);
    }

    /* Toggle switch */
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-3, 12px);
      background: var(--color-bg-card, #2a2a32);
      border-radius: var(--radius-md, 6px);
      cursor: pointer;
      transition: background var(--transition-fast, 0.15s ease);
    }

    .settings-toggle:hover {
      background: var(--color-bg-cardHover, #32323c);
    }

    .settings-toggle input {
      display: none;
    }

    .toggle-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-title {
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-base, 13px);
      font-weight: var(--font-weight-medium, 500);
    }

    .toggle-description {
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-sm, 11px);
    }

    .toggle-slider {
      width: 40px;
      height: 22px;
      background: var(--color-border-default, #3c3c42);
      border-radius: var(--radius-full, 9999px);
      position: relative;
      transition: background var(--transition-normal, 0.2s ease);
      flex-shrink: 0;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform var(--transition-normal, 0.2s ease);
    }

    .settings-toggle input:checked + .toggle-slider {
      background: var(--color-primary-base, #6366f1);
    }

    .settings-toggle input:checked + .toggle-slider::after {
      transform: translateX(18px);
    }

    /* Select dropdown */
    .settings-select {
      width: 100%;
      padding: var(--spacing-3, 12px);
      background: var(--color-bg-card, #2a2a32);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-base, 13px);
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition-fast, 0.15s ease);
    }

    .settings-select:hover {
      background: var(--color-bg-cardHover, #32323c);
    }

    .settings-select:focus {
      border-color: var(--color-primary-base, #6366f1);
    }

    .settings-select option {
      background: var(--color-bg-elevated, #252530);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    /* Input field */
    .settings-input {
      width: 100%;
      padding: var(--spacing-3, 12px);
      background: var(--color-bg-card, #2a2a32);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-base, 13px);
      outline: none;
      transition: border-color var(--transition-fast, 0.15s ease);
    }

    .settings-input:hover {
      background: var(--color-bg-cardHover, #32323c);
    }

    .settings-input:focus {
      border-color: var(--color-primary-base, #6366f1);
    }

    .settings-input::placeholder {
      color: var(--color-text-disabled, rgba(255, 255, 255, 0.3));
    }

    /* Action button */
    .action-btn {
      width: 100%;
      padding: var(--spacing-3, 12px);
      background: var(--color-bg-card, #2a2a32);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
      font-size: var(--font-size-base, 13px);
      font-weight: var(--font-weight-medium, 500);
      cursor: pointer;
      transition: all var(--transition-fast, 0.15s ease);
    }

    .action-btn:hover {
      background: var(--color-bg-cardHover, #32323c);
      border-color: var(--color-border-hover, #4a4a52);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    .action-btn.primary {
      background: var(--color-primary-base, #6366f1);
      border-color: var(--color-primary-base, #6366f1);
      color: white;
    }

    .action-btn.primary:hover {
      background: var(--color-primary-hover, #5558e3);
      border-color: var(--color-primary-hover, #5558e3);
    }

    .action-btn.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn.danger:hover {
      background: var(--color-status-errorMuted, rgba(239, 68, 68, 0.15));
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--color-status-error, #ef4444);
    }

    /* Sound picker */
    .sound-picker {
      display: flex;
      gap: var(--spacing-2, 8px);
      align-items: center;
    }

    .sound-picker .settings-select {
      flex: 1;
    }

    .preview-sound-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-card, #2a2a32);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
      cursor: pointer;
      transition: all var(--transition-fast, 0.15s ease);
    }

    .preview-sound-btn:hover {
      background: var(--color-bg-cardHover, #32323c);
      border-color: var(--color-border-hover, #4a4a52);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    .preview-sound-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Theme preview */
    .theme-preview {
      background: var(--color-bg-base, #1a1a20);
      border-radius: var(--radius-md, 6px);
      padding: var(--spacing-3, 12px);
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: var(--font-size-sm, 11px);
      line-height: 1.6;
      border: 1px solid var(--color-border-default, #3c3c42);
      margin-top: var(--spacing-2, 8px);
    }

    .preview-line {
      white-space: nowrap;
    }

    /* Error message */
    .error-message {
      color: var(--color-status-error, #ef4444);
      font-size: var(--font-size-sm, 11px);
      padding: var(--spacing-2, 8px) var(--spacing-3, 12px);
      background: var(--color-status-errorMuted, rgba(239, 68, 68, 0.15));
      border-radius: var(--radius-md, 6px);
      margin-bottom: var(--spacing-3, 12px);
    }

    /* User info for cloud sync */
    .user-info-card {
      display: flex;
      align-items: center;
      gap: var(--spacing-3, 12px);
      padding: var(--spacing-3, 12px);
      background: var(--color-bg-card, #2a2a32);
      border-radius: var(--radius-md, 6px);
      margin-bottom: var(--spacing-3, 12px);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: var(--color-primary-muted, rgba(99, 102, 241, 0.15));
      border-radius: var(--radius-full, 9999px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary-base, #6366f1);
    }

    .user-details {
      flex: 1;
    }

    .user-email {
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-base, 13px);
      font-weight: var(--font-weight-medium, 500);
    }

    .sync-status {
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-sm, 11px);
    }

    .sync-status.syncing {
      color: var(--color-primary-base, #6366f1);
    }

    .sync-status.success {
      color: var(--color-status-success, #22c55e);
    }

    /* Form row for login */
    .form-row {
      display: flex;
      gap: var(--spacing-2, 8px);
      margin-bottom: var(--spacing-3, 12px);
    }

    .form-row .settings-input {
      flex: 1;
    }

    /* Divider */
    .settings-divider {
      height: 1px;
      background: var(--color-border-subtle, #333338);
      margin: var(--spacing-4, 16px) 0;
    }
  </style>
</head>
<body>
  <div class="settings-page">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="done-btn" id="done-btn">Done</button>
    </div>

    <div class="settings-content">
      <div class="settings-grid">

        <!-- Notifications -->
        <div class="settings-card">
          <div class="card-header">
            <div class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            <span class="card-title">Notifications</span>
          </div>

          <div class="settings-group">
            <label class="settings-toggle">
              <div class="toggle-content">
                <span class="toggle-title">Enable notifications</span>
                <span class="toggle-description">Get notified when AI responses complete</span>
              </div>
              <input type="checkbox" id="notifications-enabled" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="settings-group">
            <label class="settings-label">Notify when</label>
            <select id="notification-mode" class="settings-select">
              <option value="always">Always</option>
              <option value="unfocused">Window is unfocused</option>
              <option value="inactive-tab">Tab is inactive</option>
            </select>
          </div>

          <div class="settings-group">
            <label class="settings-label">Notification sound</label>
            <div class="sound-picker">
              <select id="notification-sound" class="settings-select">
                <option value="none">None (silent)</option>
              </select>
              <button id="preview-sound-btn" class="preview-sound-btn" title="Preview sound">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Terminal -->
        <div class="settings-card">
          <div class="card-header">
            <div class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
            </div>
            <span class="card-title">Terminal</span>
          </div>

          <div class="settings-group">
            <label class="settings-label">Color scheme</label>
            <select id="terminal-theme" class="settings-select">
              <!-- Populated dynamically -->
            </select>
            <div class="theme-preview" id="theme-preview">
              <div class="preview-line"><span class="preview-prompt">$</span> <span class="preview-cmd">claude</span></div>
              <div class="preview-line"><span class="preview-text">Hello! How can I help?</span></div>
              <div class="preview-line"><span class="preview-green">Success</span> <span class="preview-red">Error</span> <span class="preview-yellow">Warning</span></div>
            </div>
          </div>
        </div>

        <!-- Downloads -->
        <div class="settings-card">
          <div class="card-header">
            <div class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </div>
            <span class="card-title">Downloads</span>
          </div>

          <div class="settings-group">
            <label class="settings-label">Save location</label>
            <select id="download-save-mode" class="settings-select">
              <option value="ask">Always ask where to save</option>
              <option value="auto">Auto-save to Downloads folder</option>
            </select>
          </div>

          <div class="settings-divider"></div>

          <div class="settings-group">
            <button class="action-btn danger" id="clear-history-btn">Clear Download History</button>
          </div>
        </div>

        <!-- Cloud Sync -->
        <div class="settings-card">
          <div class="card-header">
            <div class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
              </svg>
            </div>
            <span class="card-title">Cloud Sync</span>
          </div>

          <!-- Logged out state -->
          <div id="firebase-logged-out">
            <p class="settings-description" style="margin-bottom: var(--spacing-3, 12px);">
              Sign in to sync prompts across your devices
            </p>
            <div id="firebase-error" class="error-message" style="display: none;"></div>
            <div class="settings-group">
              <input type="email" id="firebase-email" class="settings-input" placeholder="Email address">
            </div>
            <div class="settings-group">
              <input type="password" id="firebase-password" class="settings-input" placeholder="Password">
            </div>
            <div class="settings-group">
              <button class="action-btn primary" id="firebase-login-btn">Sign In</button>
            </div>
          </div>

          <!-- Logged in state -->
          <div id="firebase-logged-in" style="display: none;">
            <div class="user-info-card">
              <div class="user-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div class="user-details">
                <div class="user-email" id="firebase-user-email"></div>
                <div class="sync-status" id="firebase-sync-status">Synced</div>
              </div>
            </div>
            <div class="settings-group">
              <button class="action-btn danger" id="firebase-logout-btn">Sign Out</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const notificationsEnabled = document.getElementById('notifications-enabled');
    const notificationMode = document.getElementById('notification-mode');
    const notificationSound = document.getElementById('notification-sound');
    const previewSoundBtn = document.getElementById('preview-sound-btn');
    const downloadSaveMode = document.getElementById('download-save-mode');
    const clearHistoryBtn = document.getElementById('clear-history-btn');
    const doneBtn = document.getElementById('done-btn');
    const terminalThemeSelect = document.getElementById('terminal-theme');
    const themePreview = document.getElementById('theme-preview');

    // Theme data cache for preview
    let themesCache = {};

    // Load current settings
    async function loadSettings() {
      try {
        const settings = await window.electronAPI.getSettings();
        if (settings && settings.notifications) {
          notificationsEnabled.checked = settings.notifications.enabled;
          notificationMode.value = settings.notifications.mode;
        }

        const saveMode = await window.electronAPI.getDownloadSaveMode();
        downloadSaveMode.value = saveMode;

        // Load notification sounds
        await loadNotificationSounds(settings);

        // Load terminal themes
        await loadTerminalThemes();
      } catch (e) {
        console.error('Failed to load settings:', e);
      }
    }

    async function loadTerminalThemes() {
      try {
        const themes = await window.electronAPI.getAllTerminalThemes();
        const currentTheme = await window.electronAPI.getTerminalTheme();

        // Clear existing options using safe DOM method
        while (terminalThemeSelect.firstChild) {
          terminalThemeSelect.removeChild(terminalThemeSelect.firstChild);
        }

        // Populate dropdown with safe DOM methods
        themes.forEach(theme => {
          const option = document.createElement('option');
          option.value = theme.id;
          option.textContent = theme.name;
          if (theme.id === currentTheme.id) {
            option.selected = true;
          }
          terminalThemeSelect.appendChild(option);
        });

        // Cache current theme for preview
        themesCache[currentTheme.id] = currentTheme.theme;
        updateThemePreview(currentTheme.theme);
      } catch (e) {
        console.error('Failed to load terminal themes:', e);
      }
    }

    function updateThemePreview(theme) {
      themePreview.style.background = theme.background;
      themePreview.querySelector('.preview-text').style.color = theme.foreground;
      themePreview.querySelector('.preview-prompt').style.color = theme.green;
      themePreview.querySelector('.preview-cmd').style.color = theme.blue;
      themePreview.querySelector('.preview-green').style.color = theme.green;
      themePreview.querySelector('.preview-red').style.color = theme.red;
      themePreview.querySelector('.preview-yellow').style.color = theme.yellow;
    }

    async function loadNotificationSounds(settings) {
      try {
        const { custom, system } = await window.electronAPI.getNotificationSounds();
        const currentSound = (settings && settings.notifications && settings.notifications.sound) || 'crossai-pulse';

        // Clear existing options
        while (notificationSound.firstChild) {
          notificationSound.removeChild(notificationSound.firstChild);
        }

        // "None" option
        const noneOption = document.createElement('option');
        noneOption.value = 'none';
        noneOption.textContent = 'None (silent)';
        notificationSound.appendChild(noneOption);

        // Custom sounds group
        if (custom.length > 0) {
          const customGroup = document.createElement('optgroup');
          customGroup.label = 'Custom';
          custom.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            customGroup.appendChild(opt);
          });
          notificationSound.appendChild(customGroup);
        }

        // System sounds group
        if (system.length > 0) {
          const systemGroup = document.createElement('optgroup');
          systemGroup.label = 'System';
          system.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            systemGroup.appendChild(opt);
          });
          notificationSound.appendChild(systemGroup);
        }

        notificationSound.value = currentSound;
      } catch (e) {
        console.error('Failed to load notification sounds:', e);
      }
    }

    loadSettings();

    // Save settings on change
    notificationsEnabled.onchange = () => {
      window.electronAPI.setSetting('notifications.enabled', notificationsEnabled.checked);
    };

    notificationMode.onchange = () => {
      window.electronAPI.setSetting('notifications.mode', notificationMode.value);
    };

    notificationSound.onchange = () => {
      window.electronAPI.setSetting('notifications.sound', notificationSound.value);
    };

    previewSoundBtn.onclick = () => {
      const selected = notificationSound.value;
      if (selected !== 'none') {
        window.electronAPI.previewSound(selected);
      }
    };

    downloadSaveMode.onchange = async () => {
      await window.electronAPI.setDownloadSaveMode(downloadSaveMode.value);
    };

    terminalThemeSelect.onchange = async () => {
      const themeId = terminalThemeSelect.value;
      window.electronAPI.setSetting('terminal.theme', themeId);

      // Update preview - fetch theme if not cached
      if (!themesCache[themeId]) {
        const themeData = await window.electronAPI.getTerminalTheme();
        themesCache[themeId] = themeData.theme;
      }
      updateThemePreview(themesCache[themeId]);
    };

    clearHistoryBtn.onclick = async () => {
      await window.electronAPI.clearDownloadHistory();
      clearHistoryBtn.textContent = 'Cleared!';
      setTimeout(() => {
        clearHistoryBtn.textContent = 'Clear Download History';
      }, 1500);
    };

    doneBtn.onclick = () => {
      window.electronAPI.closeSettings();
    };

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.electronAPI.closeSettings();
      }
    });

    // Firebase Cloud Sync
    const firebaseLoggedOut = document.getElementById('firebase-logged-out');
    const firebaseLoggedIn = document.getElementById('firebase-logged-in');
    const firebaseEmail = document.getElementById('firebase-email');
    const firebasePassword = document.getElementById('firebase-password');
    const firebaseLoginBtn = document.getElementById('firebase-login-btn');
    const firebaseLogoutBtn = document.getElementById('firebase-logout-btn');
    const firebaseUserEmail = document.getElementById('firebase-user-email');
    const firebaseSyncStatus = document.getElementById('firebase-sync-status');
    const firebaseError = document.getElementById('firebase-error');

    async function loadFirebaseStatus() {
      try {
        const status = await window.electronAPI.getFirebaseStatus();
        updateFirebaseUI(status);
      } catch (e) {
        console.error('Failed to load Firebase status:', e);
      }
    }

    function updateFirebaseUI(status) {
      if (status && status.user) {
        firebaseLoggedOut.style.display = 'none';
        firebaseLoggedIn.style.display = 'block';
        firebaseUserEmail.textContent = status.user.email;
        firebaseSyncStatus.textContent = status.syncing ? 'Syncing...' : 'Synced';
        firebaseSyncStatus.className = 'sync-status ' + (status.syncing ? 'syncing' : 'success');
      } else {
        firebaseLoggedOut.style.display = 'block';
        firebaseLoggedIn.style.display = 'none';
      }
    }

    firebaseLoginBtn.onclick = async () => {
      const email = firebaseEmail.value.trim();
      const password = firebasePassword.value;

      if (!email || !password) {
        firebaseError.textContent = 'Please enter email and password';
        firebaseError.style.display = 'block';
        return;
      }

      firebaseError.style.display = 'none';
      firebaseLoginBtn.disabled = true;
      firebaseLoginBtn.textContent = 'Signing in...';

      try {
        const result = await window.electronAPI.firebaseLogin(email, password);
        if (result.success) {
          firebasePassword.value = '';
          updateFirebaseUI({ user: result.user, syncing: true });
          firebaseSyncStatus.textContent = 'Syncing prompts...';
          firebaseSyncStatus.className = 'sync-status syncing';
        } else {
          firebaseError.textContent = result.error || 'Login failed';
          firebaseError.style.display = 'block';
        }
      } catch (e) {
        firebaseError.textContent = e.message || 'Login failed';
        firebaseError.style.display = 'block';
      } finally {
        firebaseLoginBtn.disabled = false;
        firebaseLoginBtn.textContent = 'Sign In';
      }
    };

    firebaseLogoutBtn.onclick = async () => {
      try {
        await window.electronAPI.firebaseLogout();
        updateFirebaseUI({ user: null });
      } catch (e) {
        console.error('Logout failed:', e);
      }
    };

    // Allow Enter key to submit login form
    firebasePassword.onkeydown = (e) => {
      if (e.key === 'Enter') {
        firebaseLoginBtn.click();
      }
    };

    // Listen for sync status updates
    window.electronAPI.onFirebaseSyncStatus((status) => {
      if (status.type === 'migration-complete') {
        firebaseSyncStatus.textContent = `Synced (${status.promptCount} prompts)`;
        firebaseSyncStatus.className = 'sync-status success';
      } else if (status.type === 'syncing') {
        firebaseSyncStatus.textContent = 'Syncing...';
        firebaseSyncStatus.className = 'sync-status syncing';
      }
    });

    loadFirebaseStatus();
  </script>
</body>
</html>

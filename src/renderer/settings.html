<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Settings</title>
  <script type="module" src="design-system.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: transparent;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-modal {
      background: var(--color-bg-elevated, #252530);
      border-radius: var(--radius-xl, 12px);
      padding: var(--spacing-5, 20px);
      width: 320px;
      max-width: 90%;
      box-shadow: var(--shadow-lg, 0 10px 15px rgba(0, 0, 0, 0.5));
      border: 1px solid var(--color-border-default, #3c3c42);
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-4, 16px);
      padding-bottom: var(--spacing-3, 12px);
      border-bottom: 1px solid var(--color-border-subtle, #333338);
    }

    .settings-title {
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: 15px;
      font-weight: var(--font-weight-semibold, 600);
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md, 6px);
      border: none;
      background: var(--color-bg-card, #2a2a32);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      transition: all var(--transition-normal, 0.2s ease);
    }

    .close-btn:hover {
      background: var(--color-bg-cardHover, #32323c);
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
    }

    .settings-section {
      margin-bottom: var(--spacing-5, 20px);
    }

    .settings-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-xs, 10px);
      font-weight: var(--font-weight-semibold, 600);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide, 0.5px);
      margin-bottom: var(--spacing-3, 12px);
    }

    .settings-group {
      margin-bottom: var(--spacing-3, 12px);
    }

    .settings-group:last-child {
      margin-bottom: 0;
    }

    .settings-label {
      display: block;
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-sm, 11px);
      margin-bottom: var(--spacing-1, 4px);
    }

    /* Toggle switch */
    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .settings-toggle input {
      display: none;
    }

    .toggle-slider {
      width: 36px;
      height: 20px;
      background: var(--color-bg-cardHover, #32323c);
      border-radius: var(--radius-full, 9999px);
      position: relative;
      transition: background var(--transition-normal, 0.2s ease);
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform var(--transition-normal, 0.2s ease);
    }

    .settings-toggle input:checked + .toggle-slider {
      background: var(--color-primary-base, #6366f1);
    }

    .settings-toggle input:checked + .toggle-slider::after {
      transform: translateX(16px);
    }

    .toggle-label {
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
      font-size: var(--font-size-sm, 11px);
    }

    /* Select dropdown */
    .settings-group select {
      width: 100%;
      padding: var(--spacing-2, 8px) 10px;
      background: var(--color-bg-input, #1e1e24);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-sm, 11px);
      cursor: pointer;
      outline: none;
    }

    .settings-group select:hover {
      background: var(--color-bg-card, #2a2a32);
    }

    .settings-group select:focus {
      border-color: var(--color-primary-base, #6366f1);
    }

    .settings-group select option {
      background: var(--color-bg-elevated, #252530);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    /* Action button */
    .action-btn {
      width: 100%;
      padding: 10px;
      background: var(--color-bg-card, #2a2a32);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
      font-size: var(--font-size-sm, 11px);
      cursor: pointer;
      transition: all var(--transition-normal, 0.2s ease);
    }

    .action-btn:hover {
      background: var(--color-bg-cardHover, #32323c);
      border-color: var(--color-border-hover, #4a4a52);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    .action-btn.danger:hover {
      background: var(--color-status-errorMuted, rgba(239, 68, 68, 0.15));
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--color-status-error, #ef4444);
    }

    /* Theme preview */
    .theme-preview {
      background: var(--color-bg-base, #1a1a20);
      border-radius: var(--radius-md, 6px);
      padding: 10px 12px;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: var(--font-size-sm, 11px);
      line-height: 1.5;
      border: 1px solid var(--color-border-default, #3c3c42);
    }

    .preview-line {
      white-space: nowrap;
    }

    .preview-prompt {
      color: #6a9955;
    }

    .preview-cmd {
      color: #569cd6;
    }

    .preview-text {
      color: #d4d4d4;
    }

    .preview-green {
      color: #6a9955;
    }

    .preview-red {
      color: #f44747;
    }

    .preview-yellow {
      color: #dcdcaa;
    }

    /* Input field */
    .settings-input {
      width: 100%;
      padding: var(--spacing-2, 8px) 10px;
      background: var(--color-bg-input, #1e1e24);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-md, 6px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-sm, 11px);
      outline: none;
    }

    .settings-input:hover {
      background: var(--color-bg-card, #2a2a32);
    }

    .settings-input:focus {
      border-color: var(--color-primary-base, #6366f1);
    }

    .settings-input::placeholder {
      color: var(--color-text-disabled, rgba(255, 255, 255, 0.3));
    }

    /* Primary button */
    .action-btn.primary {
      background: var(--color-primary-base, #6366f1);
      border-color: var(--color-primary-base, #6366f1);
      color: white;
    }

    .action-btn.primary:hover {
      background: var(--color-primary-hover, #5558e3);
      border-color: var(--color-primary-hover, #5558e3);
    }

    .action-btn.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Error message */
    .error-message {
      color: var(--color-status-error, #ef4444);
      font-size: var(--font-size-sm, 11px);
      padding: var(--spacing-1, 4px) var(--spacing-2, 8px);
      background: var(--color-status-errorMuted, rgba(239, 68, 68, 0.15));
      border-radius: var(--radius-sm, 4px);
    }

    /* User info */
    .user-info {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1, 4px);
    }

    .user-email {
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-sm, 11px);
    }

    .sync-status {
      color: var(--color-text-muted, rgba(255, 255, 255, 0.5));
      font-size: var(--font-size-sm, 11px);
    }

    .sync-status.syncing {
      color: var(--color-primary-base, #6366f1);
    }

    .sync-status.success {
      color: var(--color-status-success, #22c55e);
    }

    /* Hint text */
    .settings-hint {
      color: var(--color-text-disabled, rgba(255, 255, 255, 0.3));
      font-size: var(--font-size-xs, 10px);
    }
  </style>
</head>
<body>
  <div class="settings-modal">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="close-btn" id="close-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="settings-section">
      <div class="section-title">Notifications</div>
      <div class="settings-group">
        <label class="settings-toggle">
          <input type="checkbox" id="notifications-enabled" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-label">Enable notifications</span>
        </label>
      </div>

      <div class="settings-group">
        <label class="settings-label">Notify when</label>
        <select id="notification-mode">
          <option value="always">Always</option>
          <option value="unfocused">Window unfocused</option>
          <option value="inactive-tab">Inactive tab only</option>
        </select>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">Downloads</div>
      <div class="settings-group">
        <label class="settings-label">Save location</label>
        <select id="download-save-mode">
          <option value="ask">Always ask</option>
          <option value="auto">Auto-save to Downloads</option>
        </select>
      </div>

      <div class="settings-group">
        <button class="action-btn danger" id="clear-history-btn">Clear Download History</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">Terminal</div>
      <div class="settings-group">
        <label class="settings-label">Color scheme</label>
        <select id="terminal-theme">
          <!-- Populated dynamically -->
        </select>
      </div>
      <div class="settings-group">
        <div class="theme-preview" id="theme-preview">
          <div class="preview-line"><span class="preview-prompt">$</span> <span class="preview-cmd">claude</span></div>
          <div class="preview-line"><span class="preview-text">Hello! How can I help?</span></div>
          <div class="preview-line"><span class="preview-green">Success</span> <span class="preview-red">Error</span> <span class="preview-yellow">Warning</span></div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">Cloud Sync</div>

      <!-- Logged out state -->
      <div id="firebase-logged-out">
        <div class="settings-group">
          <label class="settings-label">Email</label>
          <input type="email" id="firebase-email" class="settings-input" placeholder="you@example.com">
        </div>
        <div class="settings-group">
          <label class="settings-label">Password</label>
          <input type="password" id="firebase-password" class="settings-input" placeholder="••••••••">
        </div>
        <div class="settings-group">
          <div id="firebase-error" class="error-message" style="display: none;"></div>
        </div>
        <div class="settings-group">
          <button class="action-btn primary" id="firebase-login-btn">Sign In</button>
        </div>
        <div class="settings-group">
          <span class="settings-hint">Sign in to sync prompts across devices</span>
        </div>
      </div>

      <!-- Logged in state -->
      <div id="firebase-logged-in" style="display: none;">
        <div class="settings-group">
          <div class="user-info">
            <span class="user-email" id="firebase-user-email"></span>
            <span class="sync-status" id="firebase-sync-status"></span>
          </div>
        </div>
        <div class="settings-group">
          <button class="action-btn danger" id="firebase-logout-btn">Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const notificationsEnabled = document.getElementById('notifications-enabled');
    const notificationMode = document.getElementById('notification-mode');
    const downloadSaveMode = document.getElementById('download-save-mode');
    const clearHistoryBtn = document.getElementById('clear-history-btn');
    const closeBtn = document.getElementById('close-btn');
    const terminalThemeSelect = document.getElementById('terminal-theme');
    const themePreview = document.getElementById('theme-preview');

    // Theme data cache for preview
    let themesCache = {};

    // Load current settings
    async function loadSettings() {
      try {
        const settings = await window.electronAPI.getSettings();
        if (settings && settings.notifications) {
          notificationsEnabled.checked = settings.notifications.enabled;
          notificationMode.value = settings.notifications.mode;
        }

        const saveMode = await window.electronAPI.getDownloadSaveMode();
        downloadSaveMode.value = saveMode;

        // Load terminal themes
        await loadTerminalThemes();
      } catch (e) {
        console.error('Failed to load settings:', e);
      }
    }

    async function loadTerminalThemes() {
      try {
        const themes = await window.electronAPI.getAllTerminalThemes();
        const currentTheme = await window.electronAPI.getTerminalTheme();

        // Clear existing options using safe DOM method
        while (terminalThemeSelect.firstChild) {
          terminalThemeSelect.removeChild(terminalThemeSelect.firstChild);
        }

        // Populate dropdown with safe DOM methods
        themes.forEach(theme => {
          const option = document.createElement('option');
          option.value = theme.id;
          option.textContent = theme.name;
          if (theme.id === currentTheme.id) {
            option.selected = true;
          }
          terminalThemeSelect.appendChild(option);
        });

        // Cache current theme for preview
        themesCache[currentTheme.id] = currentTheme.theme;
        updateThemePreview(currentTheme.theme);
      } catch (e) {
        console.error('Failed to load terminal themes:', e);
      }
    }

    function updateThemePreview(theme) {
      themePreview.style.background = theme.background;
      themePreview.querySelector('.preview-text').style.color = theme.foreground;
      themePreview.querySelector('.preview-prompt').style.color = theme.green;
      themePreview.querySelector('.preview-cmd').style.color = theme.blue;
      themePreview.querySelector('.preview-green').style.color = theme.green;
      themePreview.querySelector('.preview-red').style.color = theme.red;
      themePreview.querySelector('.preview-yellow').style.color = theme.yellow;
    }

    loadSettings();

    // Save settings on change
    notificationsEnabled.onchange = () => {
      window.electronAPI.setSetting('notifications.enabled', notificationsEnabled.checked);
    };

    notificationMode.onchange = () => {
      window.electronAPI.setSetting('notifications.mode', notificationMode.value);
    };

    downloadSaveMode.onchange = async () => {
      await window.electronAPI.setDownloadSaveMode(downloadSaveMode.value);
    };

    terminalThemeSelect.onchange = async () => {
      const themeId = terminalThemeSelect.value;
      window.electronAPI.setSetting('terminal.theme', themeId);

      // Update preview - fetch theme if not cached
      if (!themesCache[themeId]) {
        const themeData = await window.electronAPI.getTerminalTheme();
        themesCache[themeId] = themeData.theme;
      }
      updateThemePreview(themesCache[themeId]);
    };

    clearHistoryBtn.onclick = async () => {
      await window.electronAPI.clearDownloadHistory();
      clearHistoryBtn.textContent = 'Cleared!';
      setTimeout(() => {
        clearHistoryBtn.textContent = 'Clear Download History';
      }, 1500);
    };

    closeBtn.onclick = () => {
      window.electronAPI.closeSettings();
    };

    // Close on backdrop click (click outside the modal)
    document.addEventListener('click', (e) => {
      const modal = document.querySelector('.settings-modal');
      if (modal && !modal.contains(e.target)) {
        window.electronAPI.closeSettings();
      }
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.electronAPI.closeSettings();
      }
    });

    // Firebase Cloud Sync
    const firebaseLoggedOut = document.getElementById('firebase-logged-out');
    const firebaseLoggedIn = document.getElementById('firebase-logged-in');
    const firebaseEmail = document.getElementById('firebase-email');
    const firebasePassword = document.getElementById('firebase-password');
    const firebaseLoginBtn = document.getElementById('firebase-login-btn');
    const firebaseLogoutBtn = document.getElementById('firebase-logout-btn');
    const firebaseUserEmail = document.getElementById('firebase-user-email');
    const firebaseSyncStatus = document.getElementById('firebase-sync-status');
    const firebaseError = document.getElementById('firebase-error');

    async function loadFirebaseStatus() {
      try {
        const status = await window.electronAPI.getFirebaseStatus();
        updateFirebaseUI(status);
      } catch (e) {
        console.error('Failed to load Firebase status:', e);
      }
    }

    function updateFirebaseUI(status) {
      if (status && status.user) {
        firebaseLoggedOut.style.display = 'none';
        firebaseLoggedIn.style.display = 'block';
        firebaseUserEmail.textContent = status.user.email;
        firebaseSyncStatus.textContent = status.syncing ? 'Syncing...' : 'Synced';
        firebaseSyncStatus.className = 'sync-status ' + (status.syncing ? 'syncing' : 'success');
      } else {
        firebaseLoggedOut.style.display = 'block';
        firebaseLoggedIn.style.display = 'none';
      }
    }

    firebaseLoginBtn.onclick = async () => {
      console.log('[Settings] Login button clicked');
      // Immediate visual feedback
      firebaseLoginBtn.textContent = 'Clicked!';

      const email = firebaseEmail.value.trim();
      const password = firebasePassword.value;

      console.log('[Settings] Email:', email, 'Password length:', password.length);

      if (!email || !password) {
        firebaseError.textContent = 'Please enter email and password';
        firebaseError.style.display = 'block';
        firebaseLoginBtn.textContent = 'Sign In';
        return;
      }

      firebaseError.style.display = 'none';
      firebaseLoginBtn.disabled = true;
      firebaseLoginBtn.textContent = 'Signing in...';

      try {
        console.log('[Settings] Calling firebaseLogin...');
        const result = await window.electronAPI.firebaseLogin(email, password);
        console.log('[Settings] Login result:', result);
        if (result.success) {
          firebasePassword.value = '';
          updateFirebaseUI({ user: result.user, syncing: true });
          // Migration will happen automatically on login
          firebaseSyncStatus.textContent = 'Migrating prompts...';
          firebaseSyncStatus.className = 'sync-status syncing';
        } else {
          firebaseError.textContent = result.error || 'Login failed';
          firebaseError.style.display = 'block';
        }
      } catch (e) {
        console.error('[Settings] Login error:', e);
        firebaseError.textContent = e.message || 'Login failed';
        firebaseError.style.display = 'block';
      } finally {
        firebaseLoginBtn.disabled = false;
        firebaseLoginBtn.textContent = 'Sign In';
      }
    };

    firebaseLogoutBtn.onclick = async () => {
      try {
        await window.electronAPI.firebaseLogout();
        updateFirebaseUI({ user: null });
      } catch (e) {
        console.error('Logout failed:', e);
      }
    };

    // Allow Enter key to submit login form
    firebasePassword.onkeydown = (e) => {
      if (e.key === 'Enter') {
        firebaseLoginBtn.click();
      }
    };

    // Listen for sync status updates
    window.electronAPI.onFirebaseSyncStatus((status) => {
      if (status.type === 'migration-complete') {
        firebaseSyncStatus.textContent = `Synced (${status.promptCount} prompts)`;
        firebaseSyncStatus.className = 'sync-status success';
      } else if (status.type === 'syncing') {
        firebaseSyncStatus.textContent = 'Syncing...';
        firebaseSyncStatus.className = 'sync-status syncing';
      }
    });

    loadFirebaseStatus();
  </script>
</body>
</html>

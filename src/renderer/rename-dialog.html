<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Rename Tab</title>
  <script type="module" src="design-system.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--color-bg-base, #1a1a20);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--color-bg-elevated, #252530);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-xl, 12px);
      padding: 28px;
      width: 400px;
      box-shadow: var(--shadow-lg, 0 10px 15px rgba(0, 0, 0, 0.5));
    }

    .modal-header {
      font-size: var(--font-size-xl, 18px);
      font-weight: var(--font-weight-semibold, 600);
      margin-bottom: var(--spacing-6, 24px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
    }

    .input-wrapper {
      margin-bottom: 28px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: var(--color-bg-input, #1e1e24);
      border: 1px solid var(--color-border-default, #3c3c42);
      border-radius: var(--radius-lg, 8px);
      color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
      font-size: var(--font-size-lg, 16px);
      outline: none;
      transition: all var(--transition-normal, 0.2s ease);
    }

    input:focus {
      border-color: var(--color-primary-base, #6366f1);
      background: var(--color-bg-card, #2a2a32);
      box-shadow: 0 0 0 3px var(--color-primary-muted, rgba(99, 102, 241, 0.15));
    }

    input::placeholder {
      color: var(--color-text-disabled, rgba(255, 255, 255, 0.3));
    }

    .buttons {
      display: flex;
      gap: var(--spacing-3, 12px);
      justify-content: flex-end;
    }

    button {
      padding: 12px 28px;
      border-radius: var(--radius-lg, 8px);
      border: none;
      font-size: var(--font-size-md, 14px);
      font-weight: var(--font-weight-semibold, 600);
      cursor: pointer;
      transition: all var(--transition-fast, 0.15s ease);
    }

    .cancel {
      background: var(--color-bg-card, #2a2a32);
      color: var(--color-text-secondary, rgba(255, 255, 255, 0.7));
    }

    .cancel:hover {
      background: var(--color-bg-cardHover, #32323c);
    }

    .confirm {
      background: var(--color-primary-base, #6366f1);
      color: white;
    }

    .confirm:hover {
      background: var(--color-primary-hover, #5558e3);
    }
  </style>
</head>
<body>
  <div class="modal-backdrop" id="backdrop">
    <div class="modal">
      <div class="modal-header">Rename Tab</div>
      <div class="input-wrapper">
        <input type="text" id="name-input" placeholder="Enter new name" autofocus>
      </div>
      <div class="buttons">
        <button class="cancel" id="cancel-btn">Cancel</button>
        <button class="confirm" id="confirm-btn">Rename</button>
      </div>
    </div>
  </div>

  <script src="rename-dialog.js"></script>
</body>
</html>
